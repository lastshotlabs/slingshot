name: CI

on:
  pull_request:
    branches: [main]

jobs:
  hardening-core:
    name: Hardening Core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Typecheck root
        run: bun run typecheck:root

      - name: Test
        run: bun run test

  docs-and-deps:
    name: Docs & Dependency Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Dependency cruiser
        run: bun run lint:deps

      - name: Docs CI
        run: bun run docs:ci
