name: Pages Hello

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Make minimal site
        run: |
          mkdir -p _site
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html><head><title>hello</title></head>
          <body><h1>hello world</h1><p>If you see this, Pages serves.</p></body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
