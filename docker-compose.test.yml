services:
  temporal:
    image: temporalio/temporal@sha256:896dc523ec52eaa18873c45ddf9df83ecb33d7e12dd19481bf032565657c6028
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --port
      - '7233'
      - --ui-port
      - '8233'
      - --headless
      - --search-attribute
      - SlingshotKind=Keyword
      - --search-attribute
      - SlingshotName=Keyword
      - --search-attribute
      - SlingshotTenantId=Keyword
      - --search-attribute
      - SlingshotPriority=Int
      - --search-attribute
      - SlingshotTags=KeywordList
    ports: ['7233:7233', '8233:8233']
    healthcheck:
      test: ['CMD', 'temporal', 'operator', 'namespace', 'list', '--address', 'localhost:7233']
      interval: 5s
      timeout: 10s
      retries: 20
  redis:
    image: redis:7-alpine
    ports: ['6380:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      retries: 5
  mongo:
    image: mongo:7
    ports: ['27018:27017']
    environment:
      MONGO_INITDB_DATABASE: slingshot_test
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 2s
      retries: 5
  postgres:
    image: postgres:16-alpine
    ports: ['5433:5432']
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slingshot_test
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 2s
      retries: 5
  localstack:
    image: localstack/localstack:3
    ports: ['4566:4566']
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    healthcheck:
      test:
        [
          'CMD',
          'bash',
          '-c',
          'curl -sf http://localhost:4566/_localstack/health | grep -Eq "\"s3\"[[:space:]]*:[[:space:]]*\"(available|running)\""',
        ]
      interval: 5s
      timeout: 10s
      retries: 10
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.5
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - '1'
      - --default-log-level=warn
    ports: ['19092:19092']
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster info --brokers localhost:9092 >/dev/null 2>&1']
      interval: 5s
      timeout: 10s
      retries: 20
  redpanda-sasl:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.5
    environment:
      RP_BOOTSTRAP_USER: superuser:secretpassword
    volumes:
      - ./tests/fixtures/redpanda-sasl.bootstrap.yml:/etc/redpanda/.bootstrap.yaml
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:29093
      - --advertise-kafka-addr
      - internal://redpanda-sasl:9092,external://localhost:29093
      - --rpc-addr
      - redpanda-sasl:33146
      - --advertise-rpc-addr
      - redpanda-sasl:33146
      - --mode
      - dev-container
      - --smp
      - '1'
      - --default-log-level=warn
    ports: ['29093:29093']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'rpk cluster info --brokers localhost:9092 -X user=superuser -X pass=secretpassword -X sasl.mechanism=SCRAM-SHA-256 >/dev/null 2>&1',
        ]
      interval: 5s
      timeout: 10s
      retries: 20
  redpanda-tls:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.5
    user: 0:0
    entrypoint: ['/bin/sh']
    volumes:
      - ./tests/fixtures/redpanda-tls.redpanda.yaml:/mnt/redpanda-tls.yaml:ro
      - ./tests/fixtures/redpanda-tls:/etc/redpanda/certs:ro
    command:
      - -lc
      - |
        cp /mnt/redpanda-tls.yaml /tmp/redpanda-tls.yaml
        exec /usr/bin/rpk redpanda start \
          --config /tmp/redpanda-tls.yaml \
          --mode dev-container \
          --smp 1 \
          --default-log-level=warn
    ports: ['39094:39094', '49095:49095']
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster info --brokers localhost:9092 >/dev/null 2>&1']
      interval: 5s
      timeout: 10s
      retries: 20
